<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--color-text-primary,#1a1a1a);background:var(--color-background-tertiary,#f5f5f3);min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:24px 16px}
h1{font-size:20px;font-weight:500;margin-bottom:20px}
.top-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px}
select,input[type=text],input[type=number],input[type=date]{height:36px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.3));border-radius:8px;padding:0 10px;font-size:13px;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a);outline:none}
select:focus,input:focus{border-color:var(--color-border-primary,rgba(0,0,0,.4))}
button{height:36px;padding:0 14px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.3));border-radius:8px;font-size:13px;cursor:pointer;background:transparent;color:var(--color-text-primary,#1a1a1a)}
button:hover{background:var(--color-background-secondary,#f0f0ee)}
button.primary{background:#185FA5;color:#fff;border-color:#185FA5}
button.primary:hover{background:#0C447C}
button.danger{color:#A32D2D;border-color:rgba(163,45,45,.4)}
button.danger:hover{background:#FCEBEB}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.card{background:var(--color-background-secondary,#f0f0ee);border-radius:8px;padding:14px 16px}
.card .lbl{font-size:12px;color:var(--color-text-secondary,#666);margin-bottom:6px}
.card .val{font-size:22px;font-weight:500}
.progress-bar{height:6px;border-radius:3px;background:var(--color-border-tertiary,rgba(0,0,0,.12));margin-top:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:#185FA5;transition:width .3s}
.progress-fill.warn{background:#BA7517}
.progress-fill.over{background:#A32D2D}
.section{background:var(--color-background-primary,#fff);border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12));border-radius:12px;padding:20px;margin-bottom:20px}
.section-title{font-size:15px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.15));color:var(--color-text-secondary,#666);font-weight:400;white-space:nowrap}
td{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary,#f9f9f7)}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px}
.badge.ok{background:#EAF3DE;color:#3B6D11}
.badge.no{background:#FCEBEB;color:#A32D2D}
.tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;padding-bottom:12px;border-bottom:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.12))}
.tab{height:32px;padding:0 14px;border-radius:16px;font-size:13px;cursor:pointer;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.3));background:transparent;color:var(--color-text-primary,#1a1a1a)}
.tab.active{background:#185FA5;color:#fff;border-color:#185FA5}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:16px}
.modal-bg.open{display:flex}
.modal{background:var(--color-background-primary,#fff);border-radius:12px;padding:24px;width:100%;max-width:480px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.15));max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:500;margin-bottom:16px}
.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:12px;color:var(--color-text-secondary,#666);margin-bottom:4px}
.form-row input,.form-row select,.form-row textarea{width:100%}
.form-row textarea{height:70px;padding:8px 10px;border:0.5px solid var(--color-border-secondary,rgba(0,0,0,.3));border-radius:8px;font-size:13px;resize:vertical;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a1a)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.cat-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.empty{text-align:center;color:var(--color-text-secondary,#888);padding:32px 0;font-size:13px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.url-banner{background:#E6F1FB;border:0.5px solid #B5D4F4;border-radius:8px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#0C447C;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.url-banner input{flex:1;min-width:200px;height:30px;font-size:12px;border-color:#B5D4F4;color:#0C447C}
.sync-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--color-text-secondary,#888)}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block}
.dot.ok{background:#639922}
.dot.err{background:#A32D2D}
.dot.loading{background:#BA7517;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.img-upload-area{border:1.5px dashed var(--color-border-secondary,rgba(0,0,0,.3));border-radius:8px;padding:16px;text-align:center;cursor:pointer;font-size:13px;color:var(--color-text-secondary,#888);transition:border-color .2s}
.img-upload-area:hover{border-color:#185FA5;color:#185FA5}
.img-preview{width:100%;max-height:160px;object-fit:contain;border-radius:8px;margin-top:8px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1))}
.img-thumb{width:48px;height:48px;object-fit:cover;border-radius:6px;border:0.5px solid var(--color-border-tertiary,rgba(0,0,0,.1));cursor:pointer}
.img-viewer-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center}
.img-viewer-bg.open{display:flex}
.img-viewer-bg img{max-width:90vw;max-height:90vh;border-radius:8px}
.uploading{font-size:12px;color:#BA7517;margin-top:6px}
</style>
</head>
<body>
<div class="wrap">
  <h1>기술연구소 예산 관리</h1>

  <div class="url-banner" id="urlBanner">
    <span style="white-space:nowrap;font-weight:500">Apps Script URL</span>
    <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec 붙여넣기">
    <button class="primary" onclick="connectScript()" style="height:30px;padding:0 12px;font-size:12px">연결</button>
  </div>

  <div class="top-bar">
    <select id="selYear"></select>
    <select id="selMonth"></select>
    <button class="primary" onclick="openEntryModal()">+ 사용내역 추가</button>
    <button onclick="openBudgetModal()">예산 설정</button>
    <button onclick="openCatModal()">항목 관리</button>
    <div class="sync-bar">
      <span class="dot" id="syncDot"></span>
      <span id="syncMsg">미연결</span>
      <button onclick="syncLoad()" style="height:28px;padding:0 10px;font-size:12px">새로고침</button>
      <button onclick="changeScriptUrl()" style="height:28px;padding:0 10px;font-size:12px">URL 변경</button>
    </div>
  </div>

  <div class="cards" id="summaryCards"></div>

  <div class="section">
    <div class="section-title"><span>항목별 예산 현황</span></div>
    <table>
      <thead><tr><th>항목</th><th>할당 예산</th><th>사용 금액</th><th>잔여 예산</th><th>사용률</th></tr></thead>
      <tbody id="catBody"></tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-title">
      <span>사용 내역</span>
      <select id="filterErp" onchange="render()">
        <option value="">ERP 전체</option>
        <option value="Y">등록 완료</option>
        <option value="N">미등록</option>
      </select>
    </div>
    <div class="tabs" id="catTabs"></div>
    <table>
      <thead><tr><th>날짜</th><th>항목</th><th>사용자</th><th>사용 내용</th><th style="text-align:right">금액(원)</th><th>영수증</th><th>ERP</th><th>관리</th></tr></thead>
      <tbody id="entryBody"></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- 이미지 뷰어 -->
<div class="img-viewer-bg" id="imgViewer" onclick="closeImgViewer()">
  <img id="imgViewerSrc" src="">
</div>

<!-- 상세보기 모달 -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <h2>사용내역 상세보기</h2>
    <div id="detailContent"></div>
    <div class="form-actions"><button onclick="closeDetailModal()">닫기</button></div>
  </div>
</div>

<!-- 사용내역 모달 -->
<div class="modal-bg" id="entryModal">
  <div class="modal">
    <h2 id="entryModalTitle">사용내역 추가</h2>
    <div class="form-row"><label>날짜</label><input type="date" id="eDate"></div>
    <div class="form-row"><label>예산 항목</label><select id="eCat"></select></div>
    <div class="form-row"><label>사용자</label><input type="text" id="eUser" placeholder="이름 입력"></div>
    <div class="form-row"><label>사용 내용</label><textarea id="eDesc" placeholder="사용 내용 입력"></textarea></div>
    <div class="form-row"><label>금액(원)</label><input type="number" id="eAmt" placeholder="0" min="0"></div>
    <div class="form-row"><label>ERP 등록 여부</label>
      <select id="eErp"><option value="N">미등록</option><option value="Y">등록 완료</option></select>
    </div>
    <div class="form-row">
      <label>영수증 이미지 (선택)</label>
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <button type="button" onclick="document.getElementById('eImgFile').click()" style="height:34px;padding:0 14px;font-size:13px;flex:1">파일 선택</button>
        <button type="button" id="pasteBtn" onclick="pasteImage()" style="height:34px;padding:0 14px;font-size:13px;flex:1">클립보드 붙여넣기</button>
        <input type="file" id="eImgFile" accept="image/*" style="display:none" onchange="previewImage(this)">
      </div>
      <div id="imgUploadLabel" style="font-size:12px;color:var(--color-text-secondary,#888);margin-bottom:4px"></div>
      <img id="eImgPreview" class="img-preview" style="display:none">
      <div id="imgUploading" class="uploading" style="display:none">업로드 중...</div>
    </div>
    <div class="form-actions">
      <button onclick="closeEntryModal()">취소</button>
      <button class="primary" onclick="saveEntry()">저장</button>
    </div>
  </div>
</div>

<!-- 예산 설정 모달 -->
<div class="modal-bg" id="budgetModal">
  <div class="modal">
    <h2>예산 설정 — <span id="budgetModalLabel"></span></h2>
    <div id="budgetFields"></div>
    <div class="form-actions">
      <button onclick="closeBudgetModal()">취소</button>
      <button class="primary" onclick="saveBudget()">저장</button>
    </div>
  </div>
</div>

<!-- 항목 관리 모달 -->
<div class="modal-bg" id="catModal">
  <div class="modal">
    <h2>예산 항목 관리</h2>
    <div id="catList"></div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <input type="text" id="newCatName" placeholder="새 항목명 입력" style="flex:1">
      <button class="primary" onclick="addCat()">추가</button>
    </div>
    <div class="form-actions"><button onclick="closeCatModal()">닫기</button></div>
  </div>
</div>

<script>
var SCRIPT_URL = localStorage.getItem('lab_script_url') || '';
var state = { categories: ['경상연구개발비','운반비','여비교통비'], budgets: {}, entries: [] };
var activeCat = '';
var editId = null;
var pendingImageBase64 = null;
var pendingImageMime = null;
var pendingImageName = null;
var now = new Date();

var selYear = document.getElementById('selYear');
var selMonth = document.getElementById('selMonth');

if(SCRIPT_URL) document.getElementById('scriptUrl').value = SCRIPT_URL;

(function initSelects(){
  var MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  for(var y=now.getFullYear()-2;y<=now.getFullYear()+1;y++){
    var o=document.createElement('option');
    o.value=y;o.textContent=y+'년';
    if(y===now.getFullYear())o.selected=true;
    selYear.appendChild(o);
  }
  MONTHS.forEach(function(m,i){
    var o=document.createElement('option');
    o.value=i+1;o.textContent=m;
    if(i===now.getMonth())o.selected=true;
    selMonth.appendChild(o);
  });
  selYear.addEventListener('change',render);
  selMonth.addEventListener('change',render);
})();

function fmt(n){return Math.round(n).toLocaleString('ko-KR')}
function pct(used,alloc){return alloc>0?Math.min(100,Math.round(used/alloc*100)):0}
function curKey(){return selYear.value+'-'+String(selMonth.value).padStart(2,'0')}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show')},2500);
}
function setSyncStatus(status,msg){
  document.getElementById('syncDot').className='dot '+status;
  document.getElementById('syncMsg').textContent=msg;
}

function connectScript(){
  var url=document.getElementById('scriptUrl').value.trim();
  if(!url){alert('URL을 입력해주세요.');return}
  SCRIPT_URL=url;
  localStorage.setItem('lab_script_url',url);
  document.getElementById('urlBanner').style.display='none';
  syncLoad();
}

function syncLoad(){
  if(!SCRIPT_URL){setSyncStatus('err','미연결');return}
  setSyncStatus('loading','불러오는 중...');
  fetch(SCRIPT_URL+'?action=load')
    .then(function(r){return r.json()})
    .then(function(data){
      if(data.error){setSyncStatus('err','오류: '+data.error);return}
      state=data;
      setSyncStatus('ok','동기화 완료');
      render();
    })
    .catch(function(){setSyncStatus('err','연결 실패')});
}

function syncSave(){
  if(!SCRIPT_URL)return;
  setSyncStatus('loading','저장 중...');
  fetch(SCRIPT_URL+'?action=save&data='+encodeURIComponent(JSON.stringify(state)))
    .then(function(r){return r.json()})
    .then(function(data){
      if(data.error){setSyncStatus('err','저장 오류');showToast('저장 실패: '+data.error);return}
      setSyncStatus('ok','저장 완료');
      showToast('저장되었습니다.');
    })
    .catch(function(){setSyncStatus('err','저장 실패');showToast('저장에 실패했습니다.')});
}

function uploadImageToScript(base64, mime, name){
  return fetch(SCRIPT_URL+'?action=uploadImage&imageData='+encodeURIComponent(base64)+'&fileName='+encodeURIComponent(name)+'&mimeType='+encodeURIComponent(mime))
    .then(function(r){return r.json()});
}

function previewImage(input){
  var file = input.files[0];
  if(!file) return;
  setImageFile(file);
}

function pasteImage(){
  if(!navigator.clipboard || !navigator.clipboard.read){
    alert('이 브라우저는 클립보드 붙여넣기를 지원하지 않습니다.\n파일 선택을 이용해 주세요.');return;
  }
  navigator.clipboard.read().then(function(items){
    for(var i=0;i<items.length;i++){
      var item = items[i];
      var imgType = item.types.find(function(t){return t.startsWith('image/')});
      if(imgType){
        item.getType(imgType).then(function(blob){
          var file = new File([blob], 'clipboard_image.png', {type: blob.type});
          setImageFile(file);
        });
        return;
      }
    }
    alert('클립보드에 이미지가 없습니다.\n이미지를 복사한 후 다시 시도해 주세요.');
  }).catch(function(){
    alert('클립보드 접근 권한이 필요합니다.\n브라우저에서 권한을 허용해 주세요.');
  });
}

function setImageFile(file){
  pendingImageMime = file.type;
  pendingImageName = file.name;
  var reader = new FileReader();
  reader.onload = function(e){
    var result = e.target.result;
    pendingImageBase64 = result.split(',')[1];
    var preview = document.getElementById('eImgPreview');
    preview.src = result;
    preview.style.display = 'block';
    document.getElementById('imgUploadLabel').textContent = file.name;
  };
  reader.readAsDataURL(file);
}

function render(){
  var key=curKey();
  var budgets=state.budgets[key]||{};
  var entries=state.entries.filter(function(e){return e.monthKey===key});
  var usedByCat={};
  state.categories.forEach(function(c){usedByCat[c]=0});
  entries.forEach(function(e){usedByCat[e.cat]=(usedByCat[e.cat]||0)+Number(e.amt)});
  var totalAlloc=0,totalUsed=0;
  state.categories.forEach(function(c){
    totalAlloc+=Number(budgets[c]||0);
    totalUsed+=usedByCat[c]||0;
  });
  var totalRemain=totalAlloc-totalUsed;
  var p=pct(totalUsed,totalAlloc);

  document.getElementById('summaryCards').innerHTML=
    '<div class="card"><div class="lbl">총 할당 예산</div><div class="val">'+fmt(totalAlloc)+'원</div></div>'+
    '<div class="card"><div class="lbl">총 사용 금액</div><div class="val">'+fmt(totalUsed)+'원</div></div>'+
    '<div class="card"><div class="lbl">잔여 예산</div><div class="val" style="color:'+(totalRemain<0?'#A32D2D':'#3B6D11')+'">'+fmt(totalRemain)+'원</div></div>'+
    '<div class="card"><div class="lbl">사용률</div><div class="val">'+p+'%</div><div class="progress-bar"><div class="progress-fill'+(p>=100?' over':p>=80?' warn':'')+'" style="width:'+p+'%"></div></div></div>';

  var catHTML='';
  state.categories.forEach(function(c){
    var alloc=Number(budgets[c]||0);
    var used=usedByCat[c]||0;
    var remain=alloc-used;
    var pp=pct(used,alloc);
    catHTML+='<tr><td>'+c+'</td><td>'+fmt(alloc)+'원</td><td>'+fmt(used)+'원</td>'+
      '<td><span style="color:'+(remain<0?'#A32D2D':'#3B6D11')+'">'+fmt(remain)+'원</span></td>'+
      '<td><div style="display:flex;align-items:center;gap:8px">'+
        '<div class="progress-bar" style="width:80px"><div class="progress-fill'+(pp>=100?' over':pp>=80?' warn':'')+'" style="width:'+pp+'%"></div></div>'+
        '<span style="font-size:12px;color:var(--color-text-secondary)">'+pp+'%</span></div></td></tr>';
  });
  document.getElementById('catBody').innerHTML=catHTML||'<tr><td colspan="5" class="empty">항목이 없습니다.</td></tr>';

  var tabsHTML='<button class="tab'+(activeCat===''?' active':'')+'" onclick="setTab(\'\')">전체</button>';
  state.categories.forEach(function(c){
    tabsHTML+='<button class="tab'+(activeCat===c?' active':'')+'" onclick="setTab(\''+c.replace(/'/g,"\\'")+'\')">' +c+'</button>';
  });
  document.getElementById('catTabs').innerHTML=tabsHTML;

  var fe=document.getElementById('filterErp').value;
  var filtered=entries.filter(function(e){
    if(activeCat&&e.cat!==activeCat)return false;
    if(fe&&e.erp!==fe)return false;
    return true;
  }).sort(function(a,b){return b.date.localeCompare(a.date)});

  var entHTML='';
  if(filtered.length===0){
    entHTML='<tr><td colspan="8" class="empty">사용 내역이 없습니다.</td></tr>';
  } else {
    filtered.forEach(function(e){
      var imgCell = e.imageUrl
        ? '<img src="'+e.imageUrl+'" class="img-thumb" onclick="openImgViewer(\''+e.imageUrl+'\')" title="클릭하면 크게 보기">'
        : '<span style="font-size:12px;color:var(--color-text-secondary)">없음</span>';
      entHTML+='<tr style="cursor:pointer" onclick="openDetailModal(\''+e.id+'\')">'+
        '<td style="white-space:nowrap">'+e.date+'</td><td>'+e.cat+'</td><td>'+e.user+'</td>'+
        '<td style="max-width:200px">'+e.desc+'</td>'+
        '<td style="text-align:right;font-variant-numeric:tabular-nums">'+fmt(e.amt)+'</td>'+
        '<td onclick="event.stopPropagation()">'+imgCell+'</td>'+
        '<td onclick="event.stopPropagation()">'+
          '<div style="display:flex;align-items:center;gap:6px">'+
            '<span class="badge '+(e.erp==='Y'?'ok':'no')+'">'+(e.erp==='Y'?'등록 완료':'미등록')+'</span>'+
            '<button style="height:26px;padding:0 8px;font-size:11px" onclick="toggleErp(\''+e.id+'\')">'+(e.erp==='Y'?'미등록으로':'등록')+'</button>'+
          '</div>'+
        '</td>'+
        '<td onclick="event.stopPropagation()">'+
          '<button style="height:28px;padding:0 8px;font-size:12px" onclick="openEntryModal(\''+e.id+'\')">수정</button> '+
          '<button class="danger" style="height:28px;padding:0 8px;font-size:12px" onclick="deleteEntry(\''+e.id+'\')">삭제</button>'+
        '</td></tr>';
    });
  }
  document.getElementById('entryBody').innerHTML=entHTML;
}

function setTab(cat){activeCat=cat;render()}
function openImgViewer(url){document.getElementById('imgViewerSrc').src=url;document.getElementById('imgViewer').classList.add('open')}
function closeImgViewer(){document.getElementById('imgViewer').classList.remove('open')}

function openEntryModal(id){
  editId=id||null;
  pendingImageBase64=null;pendingImageMime=null;pendingImageName=null;
  var eCat=document.getElementById('eCat');
  eCat.innerHTML=state.categories.map(function(c){return '<option value="'+c+'">'+c+'</option>'}).join('');
  document.getElementById('eImgPreview').style.display='none';
  document.getElementById('eImgPreview').src='';
  document.getElementById('imgUploadLabel').textContent='클릭해서 이미지 선택';
  document.getElementById('eImgFile').value='';
  if(id){
    var e=state.entries.find(function(x){return x.id===id});
    document.getElementById('entryModalTitle').textContent='사용내역 수정';
    document.getElementById('eDate').value=e.date;
    eCat.value=e.cat;
    document.getElementById('eUser').value=e.user;
    document.getElementById('eDesc').value=e.desc;
    document.getElementById('eAmt').value=e.amt;
    document.getElementById('eErp').value=e.erp;
    if(e.imageUrl){
      document.getElementById('eImgPreview').src=e.imageUrl;
      document.getElementById('eImgPreview').style.display='block';
      document.getElementById('imgUploadLabel').textContent='이미지 변경하려면 클릭';
    }
  } else {
    document.getElementById('entryModalTitle').textContent='사용내역 추가';
    document.getElementById('eDate').value=new Date().toISOString().slice(0,10);
    document.getElementById('eUser').value='';
    document.getElementById('eDesc').value='';
    document.getElementById('eAmt').value='';
    document.getElementById('eErp').value='N';
  }
  document.getElementById('entryModal').classList.add('open');
}
function closeEntryModal(){document.getElementById('entryModal').classList.remove('open')}

function saveEntry(){
  var date=document.getElementById('eDate').value;
  var cat=document.getElementById('eCat').value;
  var user=document.getElementById('eUser').value.trim();
  var desc=document.getElementById('eDesc').value.trim();
  var amt=parseFloat(document.getElementById('eAmt').value);
  var erp=document.getElementById('eErp').value;
  if(!date||!cat||!user||!desc||isNaN(amt)||amt<0){alert('모든 항목을 올바르게 입력해주세요.');return}
  var monthKey=date.slice(0,7);

  function doSave(imageUrl){
    var existingUrl = imageUrl;
    if(editId && !pendingImageBase64){
      var existing = state.entries.find(function(x){return x.id===editId});
      existingUrl = existing ? (existing.imageUrl||'') : '';
    }
    var entry={id:editId||Date.now().toString(36)+Math.random().toString(36).slice(2),date:date,cat:cat,user:user,desc:desc,amt:amt,erp:erp,monthKey:monthKey,imageUrl:existingUrl||''};
    if(editId){
      var idx=state.entries.findIndex(function(x){return x.id===editId});
      state.entries[idx]=entry;
    } else {
      state.entries.push(entry);
    }
    syncSave();closeEntryModal();render();
  }

  if(pendingImageBase64 && SCRIPT_URL){
    document.getElementById('imgUploading').style.display='block';
    uploadImageToScript(pendingImageBase64, pendingImageMime, pendingImageName)
      .then(function(res){
        document.getElementById('imgUploading').style.display='none';
        if(res.success){doSave(res.imageUrl)}
        else{showToast('이미지 업로드 실패: '+res.error);doSave('')}
      })
      .catch(function(){
        document.getElementById('imgUploading').style.display='none';
        showToast('이미지 업로드 실패');doSave('');
      });
  } else {
    doSave('');
  }
}

function deleteEntry(id){
  if(!confirm('삭제하시겠습니까?'))return;
  state.entries=state.entries.filter(function(e){return e.id!==id});
  syncSave();render();
}
function toggleErp(id){
  var e=state.entries.find(function(x){return x.id===id});
  if(e){e.erp=e.erp==='Y'?'N':'Y';syncSave();render();}
}

function openBudgetModal(){
  var key=curKey();
  var budgets=state.budgets[key]||{};
  document.getElementById('budgetModalLabel').textContent=selYear.value+'년 '+selMonth.value+'월';
  document.getElementById('budgetFields').innerHTML=state.categories.map(function(c){
    var sid='b_'+c.replace(/[^a-zA-Z0-9가-힣]/g,'_');
    return '<div class="form-row"><label>'+c+'</label><input type="number" id="'+sid+'" value="'+(budgets[c]||0)+'" min="0"></div>';
  }).join('');
  document.getElementById('budgetModal').classList.add('open');
}
function closeBudgetModal(){document.getElementById('budgetModal').classList.remove('open')}
function saveBudget(){
  var key=curKey();
  state.budgets[key]={};
  state.categories.forEach(function(c){
    var sid='b_'+c.replace(/[^a-zA-Z0-9가-힣]/g,'_');
    var el=document.getElementById(sid);
    state.budgets[key][c]=parseFloat(el?el.value:0)||0;
  });
  syncSave();closeBudgetModal();render();
}

function openCatModal(){renderCatList();document.getElementById('catModal').classList.add('open')}
function closeCatModal(){syncSave();document.getElementById('catModal').classList.remove('open');render()}
function renderCatList(){
  document.getElementById('catList').innerHTML=state.categories.map(function(c,i){
    return '<div class="cat-row">'+
      '<input type="text" value="'+c+'" style="flex:1" onchange="state.categories['+i+']=this.value">'+
      '<button class="danger" onclick="removeCat('+i+')" style="height:32px;padding:0 10px">삭제</button></div>';
  }).join('');
}
function removeCat(i){
  if(!confirm('삭제하시겠습니까?'))return;
  state.categories.splice(i,1);renderCatList();
}
function addCat(){
  var n=document.getElementById('newCatName').value.trim();
  if(!n){alert('항목명을 입력해주세요.');return}
  if(state.categories.indexOf(n)>=0){alert('이미 존재하는 항목입니다.');return}
  state.categories.push(n);
  document.getElementById('newCatName').value='';
  renderCatList();
}

if(SCRIPT_URL){
  document.getElementById('urlBanner').style.display='none';
  syncLoad();
} else {
  render();
}
</script>
</body>
</html>
